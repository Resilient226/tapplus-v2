<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#07080c"/>
<title>Tap+</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00e5a0;
  --black:#07080c;
  --surface:#0e0f15;
  --surface2:#15171f;
  --border:rgba(255,255,255,.07);
  --text:#eef0f8;
  --muted:rgba(238,240,248,.45);
  --red:#ff4455;
  --yellow:#ffd166;
  --radius:14px;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--black);
  color:var(--text);
  font-family:'Nunito',sans-serif;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
#app{
  height:100%;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
/* Loading screen */
#loading{
  position:fixed;inset:0;
  background:var(--black);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  z-index:9999;
  transition:opacity .3s;
}
#loading.done{opacity:0;pointer-events:none}
.load-logo{
  font-size:36px;font-weight:900;letter-spacing:-.02em;
}
.load-logo span{color:var(--green)}
.load-spinner{
  width:28px;height:28px;
  border:2.5px solid rgba(255,255,255,.1);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
#loading.hidden{opacity:0;pointer-events:none}
#loading .load-logo{font-size:52px;font-weight:900;letter-spacing:-.04em;margin-bottom:16px}
#loading .load-logo span{color:var(--green)}
#loading .load-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">Tap<span>+</span></div>
  <div class="load-spinner"></div>
</div>

<div id="app"></div>

<!-- Firebase Compat SDK (synchronous, no module issues) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="/api-client.js"></script>
<script src="/app.js"></script>

</body>
</html>
