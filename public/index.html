<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00e5a0;--black:#07080c;--card:#0e0f15;--border:rgba(255,255,255,.07);--white:#eef0f8;--gray:rgba(238,240,248,.45);--red:#ff4455;--radius:14px;--radius-sm:10px;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'Nunito',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden;}
#app{min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
#loading{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s;gap:16px}
#loading.hidden{opacity:0;pointer-events:none}
.load-logo{font-size:48px;font-weight:900;letter-spacing:-.04em}.load-logo span{color:var(--green)}
.load-spinner{width:30px;height:30px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.page{max-width:480px;margin:0 auto;padding:20px 20px 80px}
.page-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.plain-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius);padding:13px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--green);color:var(--black)}.btn-primary:hover{opacity:.9}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--white);border:1px solid var(--border)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(255,68,85,.1);color:var(--red);border:1px solid rgba(255,68,85,.2)}.btn-full{width:100%}.btn-sm{padding:8px 14px;font-size:13px}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--white);font-size:14px;font-family:'Nunito',sans-serif;outline:none;transition:border .2s}
.inp:focus{border-color:var(--green)}.inp::placeholder{color:var(--gray)}
.sel{width:100%;background:#0e0f15;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--white);font-size:14px;font-family:'Nunito',sans-serif;outline:none;cursor:pointer}
.field-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-bottom:6px}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.04);border-radius:var(--radius);padding:4px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--gray);white-space:nowrap;border:none;background:transparent;font-family:'Nunito',sans-serif}
.tab.active{background:var(--green);color:var(--black)}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(7,8,12,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;color:var(--gray);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;transition:color .15s}
.nav-item.active{color:var(--green)}.nav-icon{font-size:20px;line-height:1}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1d26;border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#modal-overlay.open{display:flex}
#modal-box{background:#0e0f15;border:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.modal-title{font-size:18px;font-weight:800}
.modal-close{background:rgba(255,255,255,.08);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--white)}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
.pin-display{display:flex;gap:12px;justify-content:center;margin:20px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s}.pin-dot.filled{background:var(--green);border-color:var(--green)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto}
.pin-key{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;font-size:20px;font-weight:700;cursor:pointer;transition:all .12s;font-family:'Nunito',sans-serif;color:var(--white)}
.pin-key:active{background:rgba(255,255,255,.14);transform:scale(.95)}.pin-key.del{font-size:16px;color:var(--gray)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:900;color:var(--green);line-height:1}.stat-lbl{font-size:11px;color:var(--gray);margin-top:4px;font-weight:600}
.toggle{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green)}.toggle-thumb{position:absolute;top:4px;left:4px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}.toggle.on .toggle-thumb{left:22px}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:18px;font-weight:900;width:28px;text-align:center}.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.lb-sub{font-size:12px;color:var(--gray)}.lb-score{font-size:18px;font-weight:900;color:var(--green)}
.goal-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.goal-bar-bg{height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin-top:10px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .5s ease}
.fb-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.fb-stars{color:#ffd166;font-size:13px;margin-bottom:6px}.fb-text{font-size:14px;line-height:1.6}.fb-meta{font-size:11px;color:var(--gray);margin-top:6px}
.ai-card{background:linear-gradient(135deg,rgba(124,106,255,.08),rgba(0,229,160,.06));border:1px solid rgba(124,106,255,.2);border-radius:var(--radius);padding:16px}
.ai-text{font-size:14px;line-height:1.75;color:rgba(238,240,248,.85)}
.tap-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 48px;max-width:420px;margin:0 auto;position:relative}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:10px}
</style>
</head>
<body>
<div id="loading">
  <div class="load-logo">Tap<span>+</span></div>
  <div class="load-spinner"></div>
</div>
<div id="app"></div>
<div id="toast"></div>
<div id="modal-overlay"><div id="modal-box"></div></div>
